  - id: faq_005
    category: general
    answer: "The turnaround time for digital pathology can vary based on the specific workflow and infrastructure in place. However, many labs report that digital pathology can reduce turnaround times by 20-30% compared to traditional microscopy, primarily due to faster slide scanning, easier access to images, and streamlined collaboration."
