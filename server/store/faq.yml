faqs:
# --- General ---
  - id: faq_001
    category: general
    answer: "Digital pathology is the practice of digitizing glass slides and using computer technology to view, manage, and analyze the resulting digital images. It allows pathologists to work with high-resolution images on a computer screen instead of using a traditional microscope."
    questions:
      - "What is digital pathology?"
      - "Can you explain what digital pathology is?"
      - "What does digital pathology involve?"
      - "How does digital pathology differ from traditional pathology?"
      - "What are the benefits of digital pathology?"

  - id: faq_002
    category: general
    answer: "Whole Slide Imaging (WSI) is a technology that allows for the scanning of entire glass slides at high resolution, creating a digital image that can be viewed and analyzed on a computer. Digital microscopy, on the other hand, typically involves capturing specific fields of view or 'snapshots' rather than the entire slide."
    questions:
      - "What is whole slide imaging?"
      - "How does whole slide imaging differ from digital microscopy?"
      - "Can you explain the difference between WSI and digital microscopy?"
      - "What are the advantages of whole slide imaging over digital microscopy?"
      - "Is whole slide imaging more effective than digital microscopy?"

  - id: faq_003
    category: general
    answer: "To view slides effectively, you need a high-resolution medical-grade monitor (ideally 4K) and a stable high-speed internet connection. On the software side, an Image Management System (IMS) or a web-based DICOM viewer is required to render the large image files smoothly."
    questions:
      - "What special hardware or software is needed to view digital slides?"
      - "Can you give a brief description of the hardware and software requirements for viewing digital slides?"
      - "What are the technical requirements for viewing digital pathology slides?"
      - "Do I need any special equipment to view digital slides?"
      - "What kind of monitor and software do I need to view digital slides?"

  - id: faq_004
    category: general
    answer: "Yes, data security is a priority. Systems typically use end-to-end encryption, HIPAA-compliant cloud or on-premise storage, and multi-factor authentication (MFA) to ensure that patient information and diagnostic data remain confidential and protected from unauthorized access."
